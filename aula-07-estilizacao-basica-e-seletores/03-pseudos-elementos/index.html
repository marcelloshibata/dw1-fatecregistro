<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Elementos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Demonstração de Pseudo-Elementos</h1>

    <h2>::before - Adiciona conteúdo antes do elemento</h2>
    <p class="antes depois">Este parágrafo tem conteúdo adicionado
        ANTES através do ::before
    </p>
    <p class="antes">Outro parágrafo</p>
    
    <hr>

    <h2>Exemplo prático de ::before e ::after</h2>

    <blockquote class="citacao">
        Só sei que nada sei - Sócrates, 399 a.C
    </blockquote>

    <blockquote class="citacao">
        67 x freitas farmando aura moggando el betas - Davi
    </blockquote>
</body>
</html>
