<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outras mídias no HTML5</title>
  </head>

  <body>
    <header>
      <h1>Outras mídias no HTML5</h1>
    </header>
    <main>
      <section>
        <h2>Aúdio</h2>
        <audio controls src="midias/audio.mp3"></audio>

        <h2>Vídeo</h2>
        <video controls src="midias/video.mp4" type="video/mp4">
          Vídeo não encontrado ou não suportado.
        </video>

        <h2>Vídeo do Youtube (externo) - iFrame</h2>
        <iframe
          src="https://www.youtube.com/embed/3hbskjYsclY?si=JoEa7aI2d6DRNj9B"
          title="Exemplo de video do youtube"
          width="560px"
          height="315px"
          frameborder="0"
        ></iframe>

        <iframe width="560" height="315" 
        src="https://www.youtube.com/embed/3hbskjYsclY?si=JoEa7aI2d6DRNj9B" 
        title="YouTube video player" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        referrerpolicy="strict-origin-when-cross-origin" 
        allowfullscreen></iframe>

        <!-- Incorporando mapas -->
         <h2>Mapas (iframe)</h2>

         <iframe 
         src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d12211.728633761877!2d-47.8512814711098!3d-24.500398402805903!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94c53436f4f0c1cb%3A0xbab60b5cc9451e73!2sRegistro%2C%20SP%2C%2011900-000!5e0!3m2!1spt-BR!2sbr!4v1773192527790!5m2!1spt-BR!2sbr" 
         width="600" 
         height="450" 
         style="border:0;" 
         allowfullscreen="" 
         loading="lazy" 
         referrerpolicy="no-referrer-when-downgrade"></iframe>

         <!-- Incorporando PDFs -->
          <h2>PDF (iframe)</h2>
          <iframe src="midias/documento.pdf" 
          frameborder="0"
          title="Horários DSM-1"
          width="600"
          height="450px"></iframe>
        
          <!-- Incorporando vetores (não perde a qualidade) logotipo, vetores são criados no figma -->
           <h2>Vetores (ilustrações)</h2>
      </section>
    </main>
  </body>
</html>
