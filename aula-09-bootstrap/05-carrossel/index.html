<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrossel com Bootstrap</title>
    <!-- Importação do Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="carousel slide" id="banner" data-bs-ride="carousel">
      <!-- Galeria de imagens -->
      <div class="carousel-inner" id="imagens">
        <!-- Item ativo do carousel -->
        <div class="carousel-item active">
          <img
            src="https://picsum.photos/id/901/1100/500"
            class="w-100 d-block"
          />
          <!-- Inserindo texto na imagem do carousel -->
          <div class="carousel-caption">
            <h2>Lorem ipsum dolor sit amet, consectetur adipisicing elit.</h2>
          </div>
        </div>

        <!-- 2º Item do carousel -->
        <div class="carousel-item">
          <img
            src="https://picsum.photos/id/910/1100/500"
            class="w-100 d-block"
          />
        </div>

        <!-- 3º Item do carousel -->
        <div class="carousel-item">
          <img
            src="https://picsum.photos/id/911/1100/500"
            class="w-100 d-block"
          />
        </div>
      </div>
      <!-- Botões inferiores -->

      <div class="carousel-indicators" id="indicadores">
        <button
          type="button"
          data-bs-target="#banner"
          data-bs-slide-to="0"
          class="active"
        ></button>
        <button
          type="button"
          data-bs-target="#banner"
          data-bs-slide-to="1"
        ></button>
        <button
          type="button"
          data-bs-target="#banner"
          data-bs-slide-to="2"
        ></button>
      </div>

      <!-- botoes de navegação -->
      <button
        type="button"
        data-bs-target="#banner"
        data-bs-slide-to="prev"
        class="carousel-control-prev"
      >
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button
        type="button"
        data-bs-target="#banner"
        data-bs-slide-to="next"
        class="carousel-control-next"
      >
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </body>
  <!-- Importando o JavaScript do Bootstrap -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
    crossorigin="anonymous"
  ></script>
  <!-- Importamos scripts embaixo do body para melhorar o desempenho de carregamento da página -->
</html>
