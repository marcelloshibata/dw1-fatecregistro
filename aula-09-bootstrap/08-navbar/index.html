<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <!-- Importação do Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <!-- NAVBAR -->
     <!-- bg-dark / bg-light / navbar-dark / navbar-light -->
    <nav class="navbar bg-dark navbar-dark">
        <div class="container-fluid">
            <a href="#" class="navbar-brand">Meu Logo</a>
            <!-- Caixa de Pesquisa -->
            <form action="" class="d-flex">
                <input type="text" class="form-control m-2">
                <button type="button" class="btn btn-danger m-2">Buscar</button>
            </form>

            <!-- BOTÃO DE MENU ESCONDIDO -->
            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu"
            style="cursor: pointer;">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>
</body>
<!-- Importando o JavaScript do Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
 integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
<!-- Importamos scripts embaixo do body para melhorar o desempenho de carregamento da página -->
</html>
