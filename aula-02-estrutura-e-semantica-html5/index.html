<!-- shift + ALT + F para formatar-->
<!-- Estrutura básica html -->
<!doctype html>
<!-- Diz ao navegador para utilizar a última versão do HTML -->

<html lang="pt-BR">
  <!-- Atributo lang informa idioma do site -->

  <head>
    <meta charset="UTF-8" />
    <!-- charset indica o conjunto de caracteres -->
    <meta name="viewpoint" content="width=device-width, initial-scale=1.0" />
    <!-- Permite apresentar uma melhor visualização em dispositivos móveis -->
    <title>Meu website</title>
    <!-- Título exibido na barra do navegador -->
  </head>

  <body>
    <!-- Conteúdo do site - o que o usuário irá visualizar -->
    <h1>Meu site</h1>
    <p>Bem-vindo ao meu site!</p>
  </body>
</html>
